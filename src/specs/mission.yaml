/missions:
    post:
        tags:
            - Mission
        summary: Start a mission
        description: Changes a mover's questState to onMission.

        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            moverId:
                                type: string

        responses:
            200:
                description: Created
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                status:
                                    type: string
                                    example: success
                                data:
                                    type: object
                                    properties:
                                        - allOf:
                                              - $ref: "#/components/schemas/Mover"
                                              - type: object
                                              - properties:
                                                    _items:
                                                        type: array
                                                        items:
                                                            type: string

            422:
                $ref: "#/components/responses/ValidationError"

    delete:
        tags:
            - Mission
        summary: End a mission
        description: Changes a mover's questState to resting and unloads all items. A mover must be in onMission state.

        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            moverId:
                                type: string

        responses:
            200:
                description: Created
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                status:
                                    type: string
                                    example: success
                                data:
                                    type: object
                                    properties:
                                        - allOf:
                                              - $ref: "#/components/schemas/Mover"
                                              - type: object
                                              - properties:
                                                    _items:
                                                        type: array
                                                        items:
                                                            type: string

            422:
                $ref: "#/components/responses/ValidationError"
